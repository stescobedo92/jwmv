ShortDescription: A fast, lightweight CLI to install, manage, and switch between multiple Java (JDK) versions on Windows.
Description: |-
  jwmv (Java Version Manager for Windows) lets you install any JDK distribution
  (Temurin, Zulu, GraalVM, Corretto, Microsoft, and more) from the Foojay Disco API,
  switch versions per-session or per-project via .jwmvrc files, and set persistent
  defaults. Includes shell integration, self-update, and diagnostics.
