name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version in SemVer format (for example 0.1.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      version: ${{ steps.vars.outputs.version }}
      assembly_version: ${{ steps.vars.outputs.assembly_version }}

    steps:
      - name: Compute version
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "assembly_version=${VERSION}.0" >> "$GITHUB_OUTPUT"

  build-assets:
    needs: prepare
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        rid:
          - win-x64
          - win-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish single-file binary
        shell: pwsh
        run: >
          dotnet publish src/Jwmv.Cli/Jwmv.Cli.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=None
          -p:DebugSymbols=false
          -p:Version=${{ needs.prepare.outputs.version }}
          -p:AssemblyVersion=${{ needs.prepare.outputs.assembly_version }}
          -p:FileVersion=${{ needs.prepare.outputs.assembly_version }}
          -p:InformationalVersion=${{ needs.prepare.outputs.version }}+${{ github.sha }}
          -p:JwmvReleaseRepository=${{ github.repository }}
          -o publish/${{ matrix.rid }}

      - name: Package release asset
        shell: pwsh
        run: |
          $dist = Join-Path $pwd "dist"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          $assetName = "jwmv-${{ matrix.rid }}.zip"
          $assetPath = Join-Path $dist $assetName
          Compress-Archive -Path "publish/${{ matrix.rid }}/jwmv.exe" -DestinationPath $assetPath -Force
          $hash = (Get-FileHash -Path $assetPath -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -Path (Join-Path $dist "$assetName.sha256") -Value "$hash *$assetName"

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: dist/*
          if-no-files-found: error

  publish-release:
    needs:
      - prepare
      - build-assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: Sign release assets with cosign
        shell: bash
        run: |
          for file in release-assets/*.zip; do
            echo "Signing $file ..."
            cosign sign-blob --yes --output-signature "${file}.sig" --output-certificate "${file}.pem" "$file"
          done

      - name: Create or update GitHub Release
        shell: bash
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          VERSION="${{ needs.prepare.outputs.version }}"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "jwmv ${VERSION}" \
              --notes "Automated release for jwmv ${VERSION}." \
              --target "${GITHUB_SHA}"
          fi

          gh release upload "$TAG" release-assets/* --clobber

  # ── Publish to NuGet as a dotnet global tool ──────────────────────────
  publish-nuget:
    needs:
      - prepare
      - publish-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Pack NuGet package
        run: >
          dotnet pack src/Jwmv.Cli/Jwmv.Cli.csproj
          -c Release
          -p:Version=${{ needs.prepare.outputs.version }}
          -o nupkg

      - name: Push to NuGet.org
        run: >
          dotnet nuget push nupkg/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

  # ── Publish npm wrapper package ───────────────────────────────────────
  publish-npm:
    needs:
      - prepare
      - publish-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Set npm package version
        working-directory: npm
        run: npm version "${{ needs.prepare.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Copy shared files
        run: |
          cp README.md npm/README.md
          cp LICENSE npm/LICENSE

      - name: Publish to npm
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance || echo "Package version already published, skipping."

  # ── Submit winget manifest via wingetcreate ────────────────────────────
  publish-winget:
    needs:
      - prepare
      - publish-release
    runs-on: windows-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: Compute SHA256 from artifacts
        shell: pwsh
        run: |
          $x64Hash = (Get-FileHash -Path release-assets/jwmv-win-x64.zip -Algorithm SHA256).Hash
          $arm64Hash = (Get-FileHash -Path release-assets/jwmv-win-arm64.zip -Algorithm SHA256).Hash
          Set-Content -Path x64.sha256 -Value $x64Hash
          Set-Content -Path arm64.sha256 -Value $arm64Hash
          Write-Host "x64 SHA256: $x64Hash"
          Write-Host "arm64 SHA256: $arm64Hash"

      - name: Build and submit winget manifests
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.WINGET_PAT }}
        run: |
          $version = "${{ needs.prepare.outputs.version }}"
          $x64Url = "https://github.com/stescobedo92/jwmv/releases/download/v${version}/jwmv-win-x64.zip"
          $arm64Url = "https://github.com/stescobedo92/jwmv/releases/download/v${version}/jwmv-win-arm64.zip"
          $x64Hash = (Get-Content x64.sha256).Trim()
          $arm64Hash = (Get-Content arm64.sha256).Trim()

          # Configure git identity
          git config --global user.name "Sergio Triana Escobedo"
          git config --global user.email "stescobedo.31@gmail.com"

          # Fork winget-pkgs if not already forked
          gh repo fork microsoft/winget-pkgs --clone=false 2>$null

          # Clone the fork
          gh repo clone stescobedo92/winget-pkgs winget-pkgs -- --depth 1
          Push-Location winget-pkgs

          # Sync with upstream
          git remote add upstream https://github.com/microsoft/winget-pkgs.git 2>$null
          git fetch upstream master --depth 1
          git checkout -b "jwmv-${version}" upstream/master

          # Create manifest directory
          $manifestDir = "manifests/s/stescobedo92/jwmv/${version}"
          New-Item -ItemType Directory -Force -Path $manifestDir | Out-Null

          # version.yaml
          @"
          # yaml-language-server: `$schema=https://aka.ms/winget-manifest.version.1.6.0.schema.json
          PackageIdentifier: stescobedo92.jwmv
          PackageVersion: ${version}
          DefaultLocale: en-US
          ManifestType: version
          ManifestVersion: 1.6.0
          "@ -replace '(?m)^          ', '' | Set-Content -Path "$manifestDir/stescobedo92.jwmv.version.yaml" -NoNewline

          # installer.yaml
          @"
          # yaml-language-server: `$schema=https://aka.ms/winget-manifest.installer.1.6.0.schema.json
          PackageIdentifier: stescobedo92.jwmv
          PackageVersion: ${version}
          MinimumOSVersion: 10.0.17763.0
          InstallerType: zip
          NestedInstallerType: portable
          NestedInstallerFiles:
            - RelativeFilePath: jwmv.exe
              PortableCommandAlias: jwmv
          Installers:
            - Architecture: x64
              InstallerUrl: ${x64Url}
              InstallerSha256: ${x64Hash}
            - Architecture: arm64
              InstallerUrl: ${arm64Url}
              InstallerSha256: ${arm64Hash}
          ManifestType: installer
          ManifestVersion: 1.6.0
          "@ -replace '(?m)^          ', '' | Set-Content -Path "$manifestDir/stescobedo92.jwmv.installer.yaml" -NoNewline

          # defaultLocale.yaml
          @"
          # yaml-language-server: `$schema=https://aka.ms/winget-manifest.defaultLocale.1.6.0.schema.json
          PackageIdentifier: stescobedo92.jwmv
          PackageVersion: ${version}
          PackageLocale: en-US
          Publisher: Sergio Triana Escobedo
          PublisherUrl: https://github.com/stescobedo92
          Author: Sergio Triana Escobedo
          PackageName: jwmv
          PackageUrl: https://github.com/stescobedo92/jwmv
          License: MIT
          LicenseUrl: https://github.com/stescobedo92/jwmv/blob/main/LICENSE
          ShortDescription: A fast, lightweight CLI to install, manage, and switch between multiple Java (JDK) versions on Windows.
          Tags:
            - java
            - jdk
            - version-manager
            - cli
            - developer-tools
          ManifestType: defaultLocale
          ManifestVersion: 1.6.0
          "@ -replace '(?m)^          ', '' | Set-Content -Path "$manifestDir/stescobedo92.jwmv.locale.en-US.yaml" -NoNewline

          # Commit and push
          git add .
          git commit -m "New package: stescobedo92.jwmv version ${version}"
          git remote set-url origin "https://x-access-token:$($env:GH_TOKEN)@github.com/stescobedo92/winget-pkgs.git"
          git push -u origin "jwmv-${version}" --force

          # Create PR
          gh pr create `
            --repo microsoft/winget-pkgs `
            --head "stescobedo92:jwmv-${version}" `
            --title "New package: stescobedo92.jwmv version ${version}" `
            --body "## Package submission`n`n- Package: stescobedo92.jwmv`n- Version: ${version}`n- URL: https://github.com/stescobedo92/jwmv`n`nAuto-submitted by CI."

          Pop-Location
