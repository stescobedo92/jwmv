name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version in SemVer format (for example 0.1.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      version: ${{ steps.vars.outputs.version }}
      assembly_version: ${{ steps.vars.outputs.assembly_version }}

    steps:
      - name: Compute version
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "assembly_version=${VERSION}.0" >> "$GITHUB_OUTPUT"

  build-assets:
    needs: prepare
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        rid:
          - win-x64
          - win-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish single-file binary
        shell: pwsh
        run: >
          dotnet publish src/Jwmv.Cli/Jwmv.Cli.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=None
          -p:DebugSymbols=false
          -p:Version=${{ needs.prepare.outputs.version }}
          -p:AssemblyVersion=${{ needs.prepare.outputs.assembly_version }}
          -p:FileVersion=${{ needs.prepare.outputs.assembly_version }}
          -p:InformationalVersion=${{ needs.prepare.outputs.version }}+${{ github.sha }}
          -p:JwmvReleaseRepository=${{ github.repository }}
          -o publish/${{ matrix.rid }}

      - name: Package release asset
        shell: pwsh
        run: |
          $dist = Join-Path $pwd "dist"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          $assetName = "jwmv-${{ matrix.rid }}.zip"
          $assetPath = Join-Path $dist $assetName
          Compress-Archive -Path "publish/${{ matrix.rid }}/jwmv.exe" -DestinationPath $assetPath -Force
          $hash = (Get-FileHash -Path $assetPath -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -Path (Join-Path $dist "$assetName.sha256") -Value "$hash *$assetName"

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: dist/*
          if-no-files-found: error

  publish-release:
    needs:
      - prepare
      - build-assets
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: Create or update GitHub Release
        shell: bash
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          VERSION="${{ needs.prepare.outputs.version }}"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "jwmv ${VERSION}" \
              --notes "Automated release for jwmv ${VERSION}." \
              --target "${GITHUB_SHA}"
          fi

          gh release upload "$TAG" release-assets/* --clobber

  # ── Publish to NuGet as a dotnet global tool ──────────────────────────
  publish-nuget:
    needs:
      - prepare
      - publish-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Pack NuGet package
        run: >
          dotnet pack src/Jwmv.Cli/Jwmv.Cli.csproj
          -c Release
          -p:Version=${{ needs.prepare.outputs.version }}
          -o nupkg

      - name: Push to NuGet.org
        run: >
          dotnet nuget push nupkg/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

  # ── Publish npm wrapper package ───────────────────────────────────────
  publish-npm:
    needs:
      - prepare
      - publish-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Set npm package version
        working-directory: npm
        run: npm version "${{ needs.prepare.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Copy shared files
        run: |
          cp README.md npm/README.md
          cp LICENSE npm/LICENSE

      - name: Publish to npm
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  # ── Submit winget manifest via wingetcreate ────────────────────────────
  publish-winget:
    needs:
      - prepare
      - publish-release
    runs-on: windows-latest
    if: github.event_name == 'push'

    steps:
      - name: Install wingetcreate
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/wingetcreate/latest" -OutFile wingetcreate.exe

      - name: Submit manifest to winget-pkgs
        shell: pwsh
        env:
          WINGET_PAT: ${{ secrets.WINGET_PAT }}
        run: |
          $version = "${{ needs.prepare.outputs.version }}"
          $x64 = "https://github.com/stescobedo92/jwmv/releases/download/v${version}/jwmv-win-x64.zip"
          $arm64 = "https://github.com/stescobedo92/jwmv/releases/download/v${version}/jwmv-win-arm64.zip"

          .\wingetcreate.exe update stescobedo92.jwmv `
            --version $version `
            --urls $x64 $arm64 `
            --token $env:WINGET_PAT `
            --submit
