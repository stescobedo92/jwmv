name: ci

on:
  push:
    branches:
      - main
      - master
      - 'feature/**'
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Jwmv.slnx

      - name: Build
        run: dotnet build Jwmv.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Jwmv.slnx -c Release --no-build
